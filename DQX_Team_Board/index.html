<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DQXチーム掲示板</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        /* --- 全体のCSS：世界観の設定 --- */
        body {
            font-family: 'DotGothic16', sans-serif; /* ドットフォント */
            background-color: #2c3e50;
            /* 石畳風の背景パターン（簡易版） */
            background-image: 
                linear-gradient(45deg, #34495e 25%, transparent 25%), 
                linear-gradient(-45deg, #34495e 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #34495e 75%),
                linear-gradient(-45deg, transparent 75%, #34495e 75%);
            background-size: 20px 20px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* --- ドラクエ風ウィンドウの共通スタイル --- */
        .dq-window {
            background-color: rgba(0, 0, 0, 0.85); /* 黒背景（少し透過） */
            border: 4px solid white; /* 白い太枠 */
            border-radius: 8px; /* 少し丸み */
            box-shadow: 0 0 0 4px black, 0 0 15px rgba(0,0,0,0.5); /* 二重枠を表現 */
            padding: 20px;
            width: 380px;
            position: relative;
        }

        /* ウィンドウのタイトル（「コマンド」風） */
        .dq-title {
            position: absolute;
            top: -15px;
            left: 20px;
            background-color: black;
            padding: 0 10px;
            border: 2px solid white;
            font-size: 14px;
            color: #f1c40f; /* ゴールド色 */
        }

        h1, h2 {
            text-align: center;
            color: white;
            margin-top: 10px;
            font-size: 20px;
        }

        /* --- 入力欄（インプット、テキストエリア） --- */
        input, textarea {
            width: calc(100% - 22px);
            background-color: black;
            border: 2px solid #555;
            color: white;
            padding: 8px;
            margin-bottom: 10px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 16px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #f1c40f; /* フォーカス時にゴールドに */
        }

        /* --- ボタン（コマンド選択風） --- */
        button {
            width: 100%;
            background-color: transparent;
            border: 2px solid white;
            color: white;
            padding: 10px;
            font-family: 'DotGothic16', sans-serif;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
        }
        /* ホバー（選択時）に「▶」を表示 */
        button:hover {
            background-color: white;
            color: black;
        }
        button:hover::before {
            content: "▶ ";
            color: black;
        }

        /* --- 掲示板の書き込みエリア --- */
        #posts {
            height: 250px;
            overflow-y: auto;
            border-top: 2px solid #555;
            margin-top: 15px;
            padding-top: 10px;
        }
        /* スクロールバーのデザインも黒く */
        #posts::-webkit-scrollbar { width: 8px; }
        #posts::-webkit-scrollbar-track { background: black; }
        #posts::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        .post-item {
            border-bottom: 1px solid #333;
            padding: 8px 0;
            font-size: 14px;
            line-height: 1.4;
        }
        .post-name {
            color: #3498db; /* ウェディ風の青 */
            margin-right: 5px;
        }
        .post-meta {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }

        .hidden { display: none !important; }

        /* サブコマンド用の小さなボタン */
        .btn-sub {
            width: auto;
            font-size: 14px;
            padding: 5px 10px;
            border-color: #888;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="register-screen" class="dq-window">
    <div class="dq-title">システム</div>
    <h2>⚔️ チーム掲示板</h2>
    <p style="text-align:center; font-size:14px; color:#bbb;">冒険者の情報を 入力してください。</p>
    
    <input type="text" id="reg-name" placeholder="キャラクター名" maxlength="8">
    <input type="password" id="reg-pass" placeholder="パスワード（4桁以上）">
    
    <div style="margin-top:20px;">
        <button onclick="register()">冒険の書をつくる</button>
    </div>
</div>

<div id="board-screen" class="dq-window hidden" style="width: 500px;">
    <div class="dq-title">チーム連絡帳</div>
    
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <span id="welcome-msg" style="color:#f1c40f;"></span>
        <button onclick="logout()" class="btn-sub">ログアウト</button>
    </div>

    <div id="posts">
        <div class="post-item">
            <span class="post-name">[システム]:</span>
            Welcome to Astoltia! チームメンバーの書き込みを待っています。
        </div>
    </div>

    <div style="margin-top:15px; border-top: 2px solid white; padding-top:10px;">
        <textarea id="msg" rows="3" placeholder="メッセージを入力（最大50文字）" maxlength="50"></textarea>
        <button onclick="postMessage()">書き込む</button>
    </div>
</div>

<script>
    // --- 処理の部分（魔法）は前回とほぼ同じですが、少しリッチに ---

    function register() {
        const name = document.getElementById('reg-name').value;
        const pass = document.getElementById('reg-pass').value;

        if (name.length < 2 || pass.length < 4) {
            // ドラクエ風のアラートにしたいけど、今回は簡易的に
            alert("「なまえ」は2文字以上、「パスワード」は4文字以上 必要です。");
            return;
        }

        localStorage.setItem('dqx_user', name);
        alert(`冒険の書に ${name} の情報を きろくしました！`);
        showBoard();
    }

    function showBoard() {
        const userName = localStorage.getItem('dqx_user');
        if (userName) {
            document.getElementById('register-screen').classList.add('hidden');
            document.getElementById('board-screen').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = "◆ " + userName;
        }
    }

    function postMessage() {
        const msg = document.getElementById('msg').value;
        const name = localStorage.getItem('dqx_user');
        if (msg === "") return;

        // 現在の日時を取得（ドラクエ10のチャット風）
        const now = new Date();
        const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;

        const postArea = document.getElementById('posts');
        const div = document.createElement('div');
        div.className = 'post-item';
        div.innerHTML = `<span class="post-name">${name}:</span> ${msg} <span class="post-meta">(${timeStr})</span>`;
        
        // 新しい投稿を一番上にする
        postArea.prepend(div); 
        
        document.getElementById('msg').value = "";
    }

    function logout() {
        if(confirm("冒険を 中断しますか？ (データは消えません)")) {
            // LocalStorageを消すのではなく、表示を戻すだけに（ログイン維持のため）
            // 本当のログアウトなら clear() だけど、今回は利便性重視
            document.getElementById('register-screen').classList.remove('hidden');
            document.getElementById('board-screen').classList.add('hidden');
        }
    }

    window.onload = showBoard;
</script>

</body>
</html>
